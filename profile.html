<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile - Shopper's Finds</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0066ff,#00bfff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.profile-box{
background:white;
width:90%;
max-width:450px;
padding:30px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.logo{
width:100px;
height:100px;
border-radius:25px;
margin-bottom:15px;
}

h1{
color:#0066ff;
margin-bottom:20px;
}

.info{
background:#f5f8ff;
padding:15px;
margin:10px 0;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:#333;
word-wrap:break-word;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#0066ff,#00bfff);
color:white;
font-size:18px;
font-weight:bold;
text-decoration:none;
cursor:pointer;
}

.logout{
background:#ff4d4d;
}

</style>
</head>

<body>

<div class="profile-box">

<img src="DCEB2DE4-214C-428E-B03C-C2185778806E.jpeg" class="logo">

<h1>👤 My Profile</h1>

<div class="info">
Name: <span id="userName">Loading...</span>
</div>

<div class="info">
Email: <span id="userEmail">Loading...</span>
</div>

<a href="deals.html" class="btn">🔥 View Deals</a>

<button class="btn logout" onclick="logout()">
🚪 Logout
</button>

</div>

<script>

let name = localStorage.getItem("sf_name");
let email = localStorage.getItem("sf_email");

if(name){
document.getElementById("userName").innerText = name;
}else{
document.getElementById("userName").innerText = "Not Logged In";
}

if(email){
document.getElementById("userEmail").innerText = email;
}else{
document.getElementById("userEmail").innerText = "Not Logged In";
}

function logout(){

localStorage.removeItem("sf_name");
localStorage.removeItem("sf_email");

window.location.href="login.html";

}

</script>

</body>
</html>
